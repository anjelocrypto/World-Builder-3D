kind = "web"
previewPath = "/"
title = "City Sandbox"
version = "1.0.0"
id = "artifacts/city-sandbox"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20531

[services.development]
run = "pnpm --filter @workspace/city-sandbox run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/city-sandbox", "run", "build" ]
publicDir = "artifacts/city-sandbox/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20531"
BASE_PATH = "/"
